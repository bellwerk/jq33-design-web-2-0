<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project | JQ33 DESIGN</title>
    <meta name="description" content="Commercial interior project by JQ33 DESIGN." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta property="og:site_name" content="JQ33 DESIGN" />
    <meta property="og:title" content="Project | JQ33 DESIGN" />
    <meta property="og:description" content="Commercial interior project by JQ33 DESIGN." />
    <meta
      property="og:image"
      content="https://jq33.design/og/jq33-design-commercial-interior-montreal.png"
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Project | JQ33 DESIGN" />
    <meta name="twitter:description" content="Commercial interior project by JQ33 DESIGN." />
    <meta
      name="twitter:image"
      content="https://jq33.design/og/jq33-design-commercial-interior-montreal.png"
    />
    <script src="/assets/js/supabase-config.js"></script>
    <script>
      (() => {
        const config = window.JQ33 || {};
        const supabaseUrl = String(config.SUPABASE_URL || "").trim();
        const anonKey = String(config.SUPABASE_ANON_KEY || "").trim();
        const PLACEHOLDER_TOKEN = /your-anon-key|your-project/i;
        if (
          !supabaseUrl ||
          !anonKey ||
          PLACEHOLDER_TOKEN.test(supabaseUrl) ||
          PLACEHOLDER_TOKEN.test(anonKey)
        ) {
          return;
        }

        const getSlug = () => {
          const path = window.location.pathname.replace(/\/+$/, "");
          const parts = path.split("/");
          const slug = parts[parts.length - 1];
          if (slug === "project.html" || slug === "projects") {
            return new URLSearchParams(window.location.search).get("slug") || "";
          }
          return slug;
        };

        const toPublicUrl = (path) => {
          if (!path) return "";
          if (/^https?:\/\//i.test(path)) return path;
          const clean = path.replace(/^\/+/, "");
          const bucketPrefix = "portfolio/";
          const normalized = clean.startsWith(bucketPrefix) ? clean : `${bucketPrefix}${clean}`;
          return `${supabaseUrl}/storage/v1/object/public/${normalized}`;
        };

        const setMeta = (selector, content) => {
          if (!content) return;
          let node = document.querySelector(selector);
          if (!node) {
            node = document.createElement("meta");
            const nameMatch = selector.match(/name="([^"]+)"/i);
            const propMatch = selector.match(/property="([^"]+)"/i);
            if (nameMatch) {
              node.setAttribute("name", nameMatch[1]);
            }
            if (propMatch) {
              node.setAttribute("property", propMatch[1]);
            }
            document.head.appendChild(node);
          }
          node.setAttribute("content", content);
        };

        const setCanonical = (href) => {
          if (!href) return;
          let node = document.querySelector('link[rel="canonical"]');
          if (!node) {
            node = document.createElement("link");
            node.setAttribute("rel", "canonical");
            document.head.appendChild(node);
          }
          node.setAttribute("href", href);
        };

        const fetchJson = async (path) => {
          const response = await fetch(`${supabaseUrl}/rest/v1/${path}`, {
            headers: {
              apikey: anonKey,
              Authorization: `Bearer ${anonKey}`
            }
          });
          if (!response.ok) return null;
          return response.json();
        };

        const init = async () => {
          const slug = getSlug();
          if (!slug) return;
          const projectData = await fetchJson(
            `portfolio_projects?select=id,slug,title,summary,meta_title,meta_description&slug=eq.${encodeURIComponent(
              slug
            )}&limit=1`
          );
          const project = Array.isArray(projectData) ? projectData[0] : null;
          if (!project) return;
          const images = await fetchJson(
            `portfolio_images?select=path,is_hero,sort_order&project_id=eq.${project.id}&order=is_hero.desc,sort_order.asc&limit=1`
          );
          const hero = Array.isArray(images) ? images[0] : null;
          const heroUrl = hero?.path ? toPublicUrl(hero.path) : "";
          const metaTitle =
            project.meta_title ||
            `${project.title} | JQ33 DESIGN Commercial Interior Project (Montreal)`;
          const metaDescription = project.meta_description || project.summary || "";
          const canonicalUrl = `${window.location.origin}/projects/${project.slug}/`;

          document.title = metaTitle;
          setMeta('meta[name="description"]', metaDescription);
          setMeta('meta[property="og:title"]', metaTitle);
          setMeta('meta[property="og:description"]', metaDescription);
          setMeta('meta[property="og:image"]', heroUrl);
          setMeta('meta[property="og:url"]', canonicalUrl);
          setMeta('meta[name="twitter:title"]', metaTitle);
          setMeta('meta[name="twitter:description"]', metaDescription);
          setMeta('meta[name="twitter:image"]', heroUrl);
          setMeta('meta[name="robots"]', "noindex, nofollow");
          setCanonical(canonicalUrl);
        };

        init();
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/site.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        --cobalt: var(--cobalt-text);
        width: 100%;
        min-height: 100vh;
        min-height: 100svh;
        background-color: #1a1a1a;
        font-family: var(--font-sans);
        color: var(--cobalt);
        overflow-x: hidden;
        position: relative;
      }

      .grain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        z-index: 100;
      }

      .fixed-nav {
        position: fixed;
        top: 0;
        left: 0;
        width: clamp(56px, 6vw, 80px);
        height: 100vh;
        height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .back-link {
        writing-mode: vertical-rl;
        text-orientation: mixed;
        transform: rotate(180deg);
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--cobalt);
        text-decoration: none;
        cursor: pointer;
        transition: color 0.3s;
      }

      .back-link:hover {
        color: #fff;
      }

      .project-container {
        width: 100%;
        padding: 0;
      }

      .hero-section {
        width: 100%;
        height: 100vh;
        height: 100svh;
        position: relative;
        overflow: hidden;
      }

      .hero-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(20%) contrast(110%);
      }

      .hero-overlay {
        position: absolute;
        bottom: clamp(1.25rem, 10vh, 6rem);
        left: clamp(1rem, 8vw, 10vw);
        right: clamp(1rem, 6vw, 4rem);
        z-index: 10;
      }

      .project-title {
        font-family: var(--font-display);
        font-size: var(--fs-h1);
        line-height: var(--lh-tight);
        margin-bottom: 2rem;
        text-shadow: 0px 0px 20px rgba(59, 65, 227, 0.2);
      }

      .details-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        padding: clamp(64px, 10vh, 120px) clamp(1rem, 8vw, 10vw);
        gap: 4rem;
        border-bottom: 1px solid rgba(59, 65, 227, 0.2);
      }

      .info-col {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        font-size: 0.75rem;
        font-weight: 500;
      }

      .label {
        text-transform: uppercase;
        opacity: 0.7;
        font-size: 0.65rem;
        margin-bottom: 8px;
        letter-spacing: 1px;
      }

      .narrative {
        padding: clamp(72px, 14vh, 160px) clamp(1rem, 8vw, 10vw);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10vw;
      }

      .narrative-text {
        font-size: 1.25rem;
        line-height: 1.6;
        font-weight: 400;
        opacity: 0.9;
      }

      .gallery {
        padding: 0 clamp(1rem, 8vw, 10vw) clamp(72px, 14vh, 160px);
        display: grid;
        grid-template-columns: 1fr;
        gap: 10vh;
      }

      .gallery-item {
        width: 100%;
        position: relative;
      }

      .gallery-image {
        width: 100%;
        height: auto;
        display: block;
        filter: grayscale(10%) contrast(105%);
      }

      .gallery-caption {
        margin-top: 1rem;
        font-size: 0.65rem;
        text-transform: uppercase;
        opacity: 0.6;
        text-align: right;
      }

      .project-pagination {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 clamp(1rem, 8vw, 10vw) clamp(64px, 10vh, 120px);
        gap: 1.5rem;
      }

      .project-nav {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--cobalt);
        text-decoration: none;
        display: inline-flex;
        gap: 0.5rem;
        align-items: center;
        transition: color 0.2s ease;
      }

      .project-nav:hover {
        color: #fff;
      }

      .project-nav.disabled {
        opacity: 0.4;
        pointer-events: none;
      }

      .cursor-dot {
        width: 20px;
        height: 20px;
        border: 2px solid var(--cobalt);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: width 0.2s, height 0.2s, background-color 0.2s;
      }

      .cursor-hover {
        background-color: var(--cobalt);
        opacity: 0.5;
        width: 40px;
        height: 40px;
      }

      a.nav-link {
        color: var(--cobalt);
        text-decoration: none;
      }

      a.nav-link:hover {
        color: #fff;
      }

      .status-message {
        padding: 12vh 10vw;
        font-size: 1.1rem;
        color: #fff;
        opacity: 0.8;
      }

      @media (max-width: 1024px) {
        .details-grid {
          grid-template-columns: 1fr 1fr;
          gap: 2rem;
        }
        .narrative {
          grid-template-columns: 1fr;
          gap: 2.5rem;
        }
        .fixed-nav {
          display: none;
        }
      }

      @media (max-width: 768px) {
        .cursor-dot {
          display: none;
        }

        .hero-overlay {
          bottom: 1.5rem;
          left: 1rem;
          right: 1rem;
        }

        .project-title {
          margin-bottom: 0;
        }

        .details-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 480px) {
        .project-title {
          font-size: var(--fs-h1);
          line-height: var(--lh-tight);
        }

        .narrative-text {
          font-size: 1rem;
          line-height: 1.55;
        }
      }
    </style>
  </head>
  <body>
    <div class="grain"></div>
    <div class="cursor-dot" id="cursor"></div>

    <header class="header-nav" data-component="header-nav"></header>

    <div class="fixed-nav">
      <a
        href="/projects/"
        class="back-link"
        onmouseenter="hoverCursor()"
        onmouseleave="leaveCursor()"
        >← Back to Projects</a
      >
    </div>

    <main class="project-container" id="project-container">
      <section class="hero-section">
        <img
          src=""
          alt="Project hero image"
          class="hero-image"
          id="hero-image"
          width="2400"
          height="1600"
          decoding="async"
          fetchpriority="high"
        />
        <div class="hero-overlay">
          <h1 class="project-title" id="hero-title"></h1>
        </div>
      </section>

      <section class="details-grid" id="details-grid"></section>

      <section class="narrative" id="narrative"></section>

      <section class="gallery" id="gallery"></section>

      <section class="project-pagination">
        <a class="project-nav" id="prev-project" href="#"></a>
        <a class="project-nav" id="next-project" href="#"></a>
      </section>

      <div style="padding: 10vh 10vw; text-align: center">
        <a
          href="/projects/"
          class="nav-link"
          style="font-size: 1.5rem; font-weight: 600"
          onmouseenter="hoverCursor()"
          onmouseleave="leaveCursor()"
          >Back to Projects →</a
        >
      </div>

      <footer class="site-footer" data-component="footer"></footer>
    </main>

    <script src="/assets/js/analytics.js"></script>
    <script src="/assets/js/portfolio-detail.js"></script>
    <script src="/assets/js/calendly.js"></script>
    <script src="/assets/js/components/header-nav.js"></script>
    <script src="/assets/js/components/footer.js"></script>
    <script src="/assets/js/nav-drawer.js"></script>
    <script>
      const cursor = document.getElementById("cursor");
      const canHover = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

      document.addEventListener("mousemove", (e) => {
        if (!canHover) return;
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
      });

      function hoverCursor() {
        if (!canHover) return;
        cursor.classList.add("cursor-hover");
      }

      function leaveCursor() {
        if (!canHover) return;
        cursor.classList.remove("cursor-hover");
      }

      if (canHover) {
        window.addEventListener("scroll", () => {
          const scrolled = window.pageYOffset;
          const heroImage = document.querySelector(".hero-image");
          if (heroImage) {
            heroImage.style.transform = `translateY(${scrolled * 0.4}px)`;
          }
        });
      }
    </script>
  </body>
</html>
