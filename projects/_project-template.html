<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{meta_title}}</title>
    <meta name="description" content="{{meta_description}}" />
    <link rel="canonical" href="{{canonical_url}}" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta property="og:site_name" content="JQ33 DESIGN" />
    <meta property="og:title" content="{{og_title}}" />
    <meta property="og:description" content="{{og_description}}" />
    <meta property="og:url" content="{{canonical_url}}" />
    <meta property="og:image" content="{{og_image}}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{og_title}}" />
    <meta name="twitter:description" content="{{og_description}}" />
    <meta name="twitter:image" content="{{og_image}}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/site.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        --cobalt: var(--cobalt-text);
        width: 100%;
        min-height: 100vh;
        min-height: 100svh;
        background-color: #1a1a1a;
        font-family: var(--font-sans);
        color: var(--cobalt);
        overflow-x: hidden;
        position: relative;
      }

      .grain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        z-index: 100;
      }

      .fixed-nav {
        position: fixed;
        top: 0;
        left: 0;
        width: clamp(56px, 6vw, 80px);
        height: 100vh;
        height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .back-link {
        writing-mode: vertical-rl;
        text-orientation: mixed;
        transform: rotate(180deg);
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--cobalt);
        text-decoration: none;
        cursor: pointer;
        transition: color 0.3s;
      }

      .back-link:hover {
        color: #fff;
      }

      .project-container {
        width: 100%;
        padding: 0;
      }

      .hero-section {
        width: 100%;
        height: 100vh;
        height: 100svh;
        position: relative;
        overflow: hidden;
      }

      .hero-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(20%) contrast(110%);
      }

      .hero-overlay {
        position: absolute;
        bottom: clamp(1.25rem, 10vh, 6rem);
        left: clamp(1rem, 8vw, 10vw);
        right: clamp(1rem, 6vw, 4rem);
        z-index: 10;
      }

      .project-title {
        font-family: var(--font-display);
        font-size: var(--fs-h1);
        line-height: var(--lh-tight);
        margin-bottom: 2rem;
        text-shadow: 0px 0px 20px rgba(59, 65, 227, 0.2);
      }

      .details-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        padding: clamp(64px, 10vh, 120px) clamp(1rem, 8vw, 10vw);
        gap: 4rem;
        border-bottom: 1px solid rgba(59, 65, 227, 0.2);
      }

      .info-col {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        font-size: 0.75rem;
        font-weight: 500;
      }

      .label {
        text-transform: uppercase;
        opacity: 0.7;
        font-size: 0.65rem;
        margin-bottom: 8px;
        letter-spacing: 1px;
      }

      .narrative {
        padding: clamp(72px, 14vh, 160px) clamp(1rem, 8vw, 10vw);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10vw;
      }

      .narrative-text {
        font-size: 1.25rem;
        line-height: 1.6;
        font-weight: 400;
        opacity: 0.9;
      }

      .gallery {
        padding: 0 clamp(1rem, 8vw, 10vw) clamp(72px, 14vh, 160px);
        display: grid;
        grid-template-columns: 1fr;
        gap: 10vh;
      }

      .gallery-item {
        width: 100%;
        position: relative;
      }

      .gallery-image {
        width: 100%;
        height: auto;
        display: block;
        filter: grayscale(10%) contrast(105%);
      }

      .gallery-caption {
        margin-top: 1rem;
        font-size: 0.65rem;
        text-transform: uppercase;
        opacity: 0.6;
        text-align: right;
      }

      .specifications {
        padding: clamp(64px, 10vh, 120px) clamp(1rem, 8vw, 10vw);
        background: rgba(59, 65, 227, 0.03);
      }

      .spec-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 1.5rem 0;
        border-bottom: 1px solid rgba(59, 65, 227, 0.1);
      }

      .spec-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        opacity: 0.6;
      }

      .spec-value {
        font-size: 0.85rem;
        font-weight: 600;
      }

      .project-pagination {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 clamp(1rem, 8vw, 10vw) clamp(64px, 10vh, 120px);
        gap: 1.5rem;
      }

      .project-nav {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--cobalt);
        text-decoration: none;
        display: inline-flex;
        gap: 0.5rem;
        align-items: center;
        transition: color 0.2s ease;
      }

      .project-nav:hover {
        color: #fff;
      }

      .project-nav.disabled {
        opacity: 0.4;
        pointer-events: none;
      }

      .cursor-dot {
        width: 20px;
        height: 20px;
        border: 2px solid var(--cobalt);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: width 0.2s, height 0.2s, background-color 0.2s;
      }

      .cursor-hover {
        background-color: var(--cobalt);
        opacity: 0.5;
        width: 40px;
        height: 40px;
      }

      a.nav-link {
        color: var(--cobalt);
        text-decoration: none;
      }

      a.nav-link:hover {
        color: #fff;
      }

      @media (max-width: 1024px) {
        .details-grid {
          grid-template-columns: 1fr 1fr;
          gap: 2rem;
        }
        .narrative {
          grid-template-columns: 1fr;
          gap: 2.5rem;
        }
        .fixed-nav {
          display: none;
        }
      }

      @media (max-width: 768px) {
        .cursor-dot {
          display: none;
        }

        .hero-overlay {
          bottom: 1.5rem;
          left: 1rem;
          right: 1rem;
        }

        .project-title {
          margin-bottom: 0;
        }

        .details-grid {
          grid-template-columns: 1fr;
        }

        .spec-row {
          flex-direction: column;
          gap: 0.5rem;
        }

        .spec-value {
          max-width: 100%;
        }
      }

      @media (max-width: 480px) {
        .project-title {
          font-size: var(--fs-h1);
          line-height: var(--lh-tight);
        }

        .narrative-text {
          font-size: 1rem;
          line-height: 1.55;
        }
      }
    </style>
  </head>
  <body>
    <div class="grain"></div>
    <div class="cursor-dot" id="cursor"></div>

    <header class="header-nav" data-component="header-nav"></header>

    <div class="fixed-nav">
      <a
        href="/projects/"
        class="back-link"
        onmouseenter="hoverCursor()"
        onmouseleave="leaveCursor()"
        >← Back to Projects</a
      >
    </div>

    <main class="project-container">
      <section class="hero-section">
        <img
          src="{{hero_image}}"
          alt="{{hero_alt}}"
          class="hero-image"
          width="2400"
          height="1600"
          decoding="async"
          fetchpriority="high"
        />
        <div class="hero-overlay">
          <h1 class="project-title">{{hero_title}}</h1>
        </div>
      </section>

      <section class="details-grid">{{details_grid}}</section>

      <section class="narrative">{{narrative_blocks}}</section>

      <section class="gallery">{{gallery_items}}</section>

      <section class="specifications">
        <div class="label" style="margin-bottom: 2rem">Design Highlights</div>
        {{spec_rows}}
      </section>

      <section class="project-pagination">
        {{prev_nav}}
        {{next_nav}}
      </section>

      <div style="padding: 10vh 10vw; text-align: center">
        <a
          href="/projects/"
          class="nav-link"
          style="font-size: 1.5rem; font-weight: 600"
          onmouseenter="hoverCursor()"
          onmouseleave="leaveCursor()"
          >Back to Projects →</a
        >
      </div>

      <footer class="site-footer" data-component="footer"></footer>
    </main>

    <script src="/assets/js/analytics.js"></script>
    <script src="/assets/js/calendly.js"></script>
    <script src="/assets/js/components/header-nav.js"></script>
    <script src="/assets/js/components/footer.js"></script>
    <script src="/assets/js/nav-drawer.js"></script>
    <script>
      const cursor = document.getElementById("cursor");
      const canHover = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

      document.addEventListener("mousemove", (e) => {
        if (!canHover) return;
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
      });

      function hoverCursor() {
        if (!canHover) return;
        cursor.classList.add("cursor-hover");
      }

      function leaveCursor() {
        if (!canHover) return;
        cursor.classList.remove("cursor-hover");
      }

      if (canHover) {
        window.addEventListener("scroll", () => {
          const scrolled = window.pageYOffset;
          const heroImage = document.querySelector(".hero-image");
          heroImage.style.transform = `translateY(${scrolled * 0.4}px)`;
        });
      }
    </script>
  </body>
</html>
