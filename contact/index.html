    <style vid="8">
      :root {
        --split-point: 50%;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 100%;
        min-height: 100vh;
        min-height: 100svh;
        overflow-x: hidden;
        overflow-y: auto;
        background-color: #ffffff;
        font-family: var(--font-sans);
        color: var(--ink);
        display: flex;
        flex-direction: column;
      }

      .contact-layout {
        display: flex;
        flex: 1 1 auto;
        min-height: 100vh;
        min-height: 100svh;
      }

      .left-panel {
        width: var(--split-point);
        height: 100%;
        background-color: #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding: clamp(120px, 10%, 170px) 8%;
        z-index: 2;
        position: relative;
      }

      .left-panel__content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex: 1 1 auto;
      }

      .right-panel {
        width: calc(100% - var(--split-point));
        height: 100%;
        position: relative;
        overflow: hidden;
      }

      .headline {
        margin-bottom: 1.75rem;
        color: var(--ink);
      }

      .page-intro {
        max-width: 36ch;
        font-size: 0.95rem;
        line-height: 1.6;
        color: #404040;
        margin-bottom: 2.25rem;
      }

      .capture-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        max-width: 480px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .input-group label {
        font-size: 0.75rem;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.1em;
        color: var(--cobalt);
      }

      .input-group input,
      .input-group select,
      .input-group textarea {
        border: none;
        border-bottom: 2px solid #e0e0e0;
        padding: 0.75rem 0;
        font-family: var(--font-sans);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.3s ease;
        background: transparent;
      }

      .input-group input:focus,
      .input-group select:focus,
      .input-group textarea:focus {
        border-color: var(--cobalt);
      }

      .input-group input:focus-visible,
      .input-group select:focus-visible,
      .input-group textarea:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: 4px;
        border-color: var(--cobalt);
      }

      .cta-button {
        margin-top: 1rem;
        background-color: var(--cobalt-base);
        color: white;
        border: none;
        display: inline-block;
        padding: 1.25rem 2rem;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.2s ease;
        text-align: center;
        text-decoration: none;
        width: fit-content;
      }

      .cta-button:hover {
        background-color: var(--cobalt-base-hover);
        transform: translateY(-2px);
      }

      .cta-button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .hp-field {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }

      .form-status {
        margin-top: 0.5rem;
        color: #1f4f2f;
        font-size: 0.9rem;
        min-height: 1.4em;
      }

      .form-status.is-error {
        color: #8b1d1d;
      }

      .bg-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: none;
        background-size: cover;
        background-position: center;
        filter: grayscale(20%) contrast(110%);
      }

      .brand-mark {
        position: absolute;
        top: 50%;
        left: 0;
        transform: translate(-50%, -50%) rotate(-90deg);
        font-family: var(--font-display);
        font-size: clamp(70px, 20vh, 230px);
        color: var(--cobalt);
        white-space: nowrap;
        z-index: 3;
        pointer-events: none;
        opacity: 0.95;
        line-height: 0.8;
        text-shadow: 0px 0px 20px rgba(59, 65, 227, 0.2);
      }

      .grain {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        z-index: 4;
      }

      .nav-header {
        position: absolute;
        top: 3rem;
        left: 8%;
        z-index: 10;
      }

      .nav-label {
        font-size: var(--fs-label);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--cobalt);
        font-weight: 600;
      }

      .site-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 14px;
      }

      .site-nav a {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-weight: 600;
        color: var(--ink);
        text-decoration: none;
        opacity: 0.8;
        transition: color 0.2s ease, opacity 0.2s ease;
      }

      .site-nav a:hover {
        color: var(--cobalt);
        opacity: 1;
      }

      .site-nav a[aria-current="page"] {
        opacity: 1;
        color: var(--cobalt);
        text-decoration: underline;
        text-underline-offset: 4px;
      }

      @media (max-width: 900px) {
        .contact-layout {
          flex-direction: column;
        }

        .left-panel {
          width: 100%;
          height: auto;
          justify-content: flex-start;
          padding: 120px 8% 12%;
        }

        .right-panel {
          width: 100%;
          height: 42vh;
          min-height: 240px;
        }

        .right-panel .brand-mark {
          left: 50%;
          transform: translate(-50%, -50%) rotate(-90deg);
          font-size: clamp(56px, 14vh, 130px);
          opacity: 0.8;
        }
      }

      @media (max-width: 640px) {
        .nav-header {
          top: 1rem;
          left: 1rem;
          right: 1rem;
        }

        .capture-form {
          max-width: 100%;
        }

        .cta-button {
          width: 100%;
          text-align: center;
        }
      }

      @media (max-width: 520px) {
        .headline {
          margin-bottom: 2rem;
        }
      }
    </style>

  <body vid="9">
    <header class="header-nav" data-component="header-nav"></header>
    <div class="nav-header">
      <div class="nav-label">JQ33 DESIGN (Montreal)</div>
    </div>
    <main class="contact-layout">
      <div class="left-panel" vid="10">
        <div class="left-panel__content">
          <h1 class="headline" vid="13">
            Commercial Interior Design<br vid="14" />in Montreal
          </h1>

          <p class="page-intro">
            Tell us about your space and timing. We respond within 24 hours with next steps and the
            best design package for your project.
          </p>

          <form class="capture-form" data-lead-form="contact" method="post" vid="16">
            <div class="hp-field" aria-hidden="true">
              <label for="contact-company">Company</label>
              <input
                type="text"
                id="contact-company"
                name="_gotcha"
                tabindex="-1"
                autocomplete="off"
              />
            </div>
            <div class="input-group" vid="17">
              <label for="contact-name" vid="18">Name</label>
              <input
                type="text"
                id="contact-name"
                name="name"
                placeholder="Your name"
                autocomplete="name"
                required
                vid="19"
              />
            </div>
            <div class="input-group" vid="20">
              <label for="contact-email" vid="21">Email</label>
              <input
                type="email"
                id="contact-email"
                name="email"
                placeholder="you@business.com"
                autocomplete="email"
                required
                vid="22"
              />
            </div>
            <div class="input-group" vid="23">
              <label for="contact-project-type" vid="24">Project Type</label>
              <select id="contact-project-type" name="project_type" required vid="25">
                <option value="" selected disabled vid="26">Select project type</option>
                <option value="coffee-shop-cafe" vid="27">Coffee shop / cafe</option>
                <option value="salon-beauty-studio" vid="28">Salon / beauty studio</option>
                <option value="clinic-wellness" vid="29">Clinic / wellness</option>
                <option value="retail-boutique" vid="30">Retail / boutique</option>
                <option value="small-office" vid="31">Small office</option>
                <option value="other" vid="32">Other</option>
              </select>
            </div>
            <div class="input-group">
              <label for="contact-message">Project details</label>
              <textarea
                id="contact-message"
                name="message"
                rows="4"
                placeholder="Tell us about your space, timeline, and goals."
                required
              ></textarea>
            </div>
            <button type="submit" class="cta-button">Get a free quote (reply in 24h)</button>
            <p class="form-status" data-form-status role="status" aria-live="polite"></p>
            <a
              class="cta-button"
              href="https://calendly.com/hello-jq33/15min"
              data-calendly-cta
              target="_blank"
              rel="noopener"
              vid="30"
              >Book a free 15-minute call</a
            >
            <p style="margin-top: 0.75rem; color: #404040; font-size: 0.9rem">
              Or: Get a free quote - reply within 24 hours
            </p>
          </form>
        </div>
      </div>

      <div class="right-panel" vid="31">
        <div class="bg-layer" id="parallax-bg" vid="32"></div>
        <div class="grain" vid="33"></div>
        <div class="brand-mark" vid="34">JQ33<br vid="35" />DESIGN</div>
      </div>
    </main>

    <footer class="site-footer site-footer--stacked" data-component="footer"></footer>

    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/analytics.js"></script>
    <script src="/assets/js/leads.js"></script>
    <script src="/assets/js/calendly.js"></script>
    <script src="/assets/js/components/header-nav.js"></script>
    <script src="/assets/js/components/footer.js"></script>
    <script src="/assets/js/nav-drawer.js"></script>
    <script vid="36">
      const bg = document.getElementById("parallax-bg");
      const canHover = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
      if (canHover && bg) {
        document.addEventListener("mousemove", (e) => {
          const x = (window.innerWidth - e.pageX * 2) / 100;
          const y = (window.innerHeight - e.pageY * 2) / 100;
          bg.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
        });
      }
    </script>
